name: Deploy Next.js App

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 7576
          script: |
            # Force the terminal to load NVM (Node/NPM/PM2 paths)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Navigate to the project directory
            cd /var/www/cadtube.com
            
            # Pull changes cleanly
            git reset --hard HEAD
            git pull origin main
            
            # Install ALL dependencies so Next.js can compile
            npm install
            
            # Build the production application (creates the .next folder)
            npm run build
            
            # Restart your existing PM2 process safely
            pm2 restart cadtube || pm2 start npm --name "cadtube" -- start
            pm2 save